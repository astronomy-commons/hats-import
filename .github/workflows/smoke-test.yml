# This workflow will run daily at 06:45.
# It will install Python dependencies and run tests with a variety of Python versions.
# See documentation for help debugging smoke test issues:
#    https://lincc-ppt.readthedocs.io/en/stable/practices/ci_testing.html#version-culprit

name: Unit test smoke test

on:
  schedule:
    - cron: 45 6 * * *
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7

      # Test 1: just use the required dependencies. 
      # Any missing dependencies should not cause new test failures.
    - name: Install required dependencies
      run: |
        sudo apt-get update
        uv pip install --system -e .[dev]
        if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
    - name: List dependencies
      run: |
        pip list
    - name: Run unit tests with pytest
      run: |
        python -m pytest tests

    # Test 2: test using all optional dependencies
    # Nightly test against dependency regressions.
    - name: Install FULL dependencies
      run: |
        uv pip install --system -e .[full]
    - name: List FULL dependencies
      run: |
        pip list
    - name: Run FULL unit tests with pytest
      run: |
        python -m pytest tests
    
    # Cleanup: send failure message (if failure)
    - name: Send status to Slack app
      if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
      id: slack
      uses: slackapi/slack-github-action@v3
      with:
        # For posting a rich message using Block Kit
        webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
        webhook-type: webhook-trigger
        payload: |
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${{ github.repository }}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "GitHub Action build result: *${{ job.status }}* :${{ job.status }}:"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }
            ]
          }
